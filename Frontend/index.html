<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroSecure - Airport Security System</title>
    <link rel="stylesheet" href="/frontend/styles/main.css">
    <link rel="stylesheet" href="/frontend/styles/animations.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="radar-scanner">
                <div class="radar-circle"></div>
                <div class="radar-line"></div>
                <div class="radar-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <h2 class="loading-text">INITIALIZING AEROSECURE</h2>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div id="main-container" class="main-container hidden">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>AeroSecure</span>
                </div>
                <div class="system-status">
                    <span class="status-indicator active"></span>
                    <span class="status-text">System Active</span>
                </div>
            </div>
            <div class="header-center">
                <div class="time-display">
                    <span id="current-time"></span>
                </div>
                <div class="date-display">
                    <span id="current-date"></span>
                </div>
            </div>
            <div class="header-right">
                <div class="alert-level">
                    <span class="alert-text">Security Level: </span>
                    <span class="alert-status normal">NORMAL</span>
                </div>
                <div class="user-profile">
                    <i class="fas fa-user-shield"></i>
                    <span>Officer Smith</span>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="sidebar">
            <div class="nav-menu">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#camera-monitor" class="nav-item" data-page="camera-monitor">
                    <i class="fas fa-video"></i>
                    <span>Camera Monitor</span>
                </a>
                <a href="#person-search" class="nav-item" data-page="person-search">
                    <i class="fas fa-search"></i>
                    <span>Person Search</span>
                </a>
                <a href="#add-person" class="nav-item" data-page="add-person">
                    <i class="fas fa-user-plus"></i>
                    <span>Add Person</span>
                </a>
                <a href="#watchlist" class="nav-item" data-page="watchlist">
                    <i class="fas fa-eye"></i>
                    <span>Watchlist</span>
                </a>
                <a href="#access-control" class="nav-item" data-page="access-control">
                    <i class="fas fa-key"></i>
                    <span>Access Control</span>
                </a>
                <a href="#reports" class="nav-item" data-page="reports">
                    <i class="fas fa-chart-line"></i>
                    <span>Reports</span>
                </a>
                <a href="#settings" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Loading indicator for sections -->
            <div class="section-loading" id="section-loading" style="display: block;">
                <div class="loading-content">
                    <div class="loading-spinner">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </div>
                    <p>Loading sections...</p>
                </div>
            </div>
            
            <!-- Sections will be loaded here dynamically -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="/frontend/js/section_loader.js"></script>
    <script src="/frontend/js/main.js"></script>
    <script src="/frontend/js/animations.js"></script>
</body>
</html>
