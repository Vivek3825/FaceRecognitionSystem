<!-- Camera Monitor Page -->
<div id="camera-monitor" class="page">
    <div class="page-header">
        <h1>Camera Monitor</h1>
        <div class="page-actions">
            <button class="btn-secondary">
                <i class="fas fa-expand"></i>
                Full Screen
            </button>
            <button class="btn-primary">
                <i class="fas fa-record-vinyl"></i>
                Record All
            </button>
        </div>
    </div>

    <div class="camera-grid">
        <div class="camera-feed active">
            <div class="camera-header">
                <span class="camera-name">Terminal A - Main Entrance</span>
                <span class="camera-status online">LIVE</span>
            </div>
            <div class="camera-display">
                <div class="scanning-overlay">
                    <div class="scan-line"></div>
                </div>
                <div class="detection-box">
                    <div class="detection-info">
                        <span>Person Detected</span>
                        <span>Confidence: 94%</span>
                    </div>
                </div>
            </div>
            <div class="camera-controls">
                <button class="control-btn"><i class="fas fa-search-plus"></i></button>
